name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-state: true
          node-version: 20
          cache: 'npm'

      - name: Install Root Dependencies
        run: npm ci

      - name: Install Client Dependencies & Build React App
        run: |
          cd client
          npm ci
          npm run build
        env:
          # If Vite needs build-time env variables, define them here:
          VITE_API_BASE_URL: '/'

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.DEPLOY_PORT || 22 }} -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy files to Production Server (rsync)
        run: |
          rsync -avz --delete \
            --exclude 'node_modules/' \
            --exclude 'client/node_modules/' \
            --exclude 'client/src/' \
            --exclude 'whatsapp_auth_state/' \
            --exclude '.env' \
            --exclude '.git/' \
            --exclude '.github/' \
            -e "ssh -i ~/.ssh/id_rsa -p ${{ secrets.DEPLOY_PORT || 22 }}" \
            ./ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_TARGET_PATH }}

      - name: SSH and Restart Application via PM2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            cd ${{ secrets.DEPLOY_TARGET_PATH }}
            npm install --production
            pm2 reload ecosystem.config.js --env production
